<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prediction Result</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <header>
        <h1>Prediction Result</h1>
        <button id="theme-toggle">🌙 Dark</button>
    </header>
    <nav>
        <a href="{{ url_for('dashboard') }}">Back to Dashboard</a>
    </nav>
    <div class="container">
        <h2>The prediction for your claim is:</h2>
        <h1 style="color: red;">{{ prediction }}</h1>
        <hr>
        <a href="{{ url_for('generate_report', claim_id=claim_id) }}" style="display: inline-block; padding: 10px 20px; background: #333; color: white; text-decoration: none; border-radius: 5px;">📄 Download PDF Report</a>
    </div>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fraud Prediction</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <header>
        <h1>Fraud Prediction</h1>
        <button id="theme-toggle">🌙 Dark</button>
    </header>
    <nav>
        <a href="{{ url_for('home') }}">Home</a>
        <a href="{{ url_for('predict') }}">New Prediction</a>
        <a href="{{ url_for('dashboard') }}">Dashboard</a>
        <a href="{{ url_for('analytics') }}">Analytics</a>
        <a href="{{ url_for('logout') }}">Logout</a>
    </nav>
    <div class="container">
        <h2>Check Claim for Fraud</h2>
        <form action="{{ url_for('predict') }}" method="POST">
            <label for="amount">Claim Amount:</label>
            <input type="number" step="0.01" id="amount" name="amount" required>
            
            <label for="age">Policyholder Age:</label>
            <input type="number" step="0.1" id="age" name="age" required>
            
            <label for="accidents">Number of Past Accidents:</label>
            <input type="number" step="0.1" id="accidents" name="accidents" required>
            
            <label for="vehicle_age">Vehicle Age (Years):</label>
            <input type="number" step="0.1" id="vehicle_age" name="vehicle_age" required>
            
            <button type="submit">Predict</button>
        </form>

        {% if prediction %}
        <div class="container" style="margin-top: 2rem; border: 2px solid var(--border-color); text-align: center;">
            <h3>Prediction Result:</h3>
            {% set result_color = 'var(--danger-color)' if 'Fraud' in prediction else 'var(--success-color)' %}
            <h2 style="color: {{ result_color }};">
                {{ prediction }}
            </h2>
        </div>
        {% endif %}
    </div>
    <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>

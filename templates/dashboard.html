<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <header>
        <h1>Welcome, {{ name }}!</h1>
        <button id="theme-toggle">🌙 Dark</button>
    </header>
    <nav>
        <a href="{{ url_for('index') }}">Home</a>
        <a href="{{ url_for('analytics') }}">Analytics</a>
        <a href="{{ url_for('logout') }}">Logout</a>
    </nav>
    <div class="container">
        <h2>Submit a Claim</h2>
        <form action="{{ url_for('predict') }}" method="POST">
            <label for="age">Age:</label>
            <input type="number" id="age" name="age" required>
            <label for="policy_state">Policy State (1-3):</label>
            <input type="number" id="policy_state" name="policy_state" required>
            <label for="policy_deductable">Policy Deductable:</label>
            <input type="number" id="policy_deductable" name="policy_deductable" required>
            <label for="incident_type">Incident Type (1-2):</label>
            <input type="number" id="incident_type" name="incident_type" required>
            <button type="submit">Predict Fraud</button>
        </form>

        <hr>
        <h2>My Recent Claims</h2>
        <table border="1" style="width: 100%; text-align: left; border-collapse: collapse;">
            <thead>
                <tr>
                    <th>Date</th>
                    <th>Prediction</th>
                    <th>Report</th>
                </tr>
            </thead>
            <tbody>
                {% for claim in claims %}
                <tr>
                    <td>{{ claim.timestamp.strftime('%Y-%m-%d %H:%M:%S') }}</td>
                    <td>{{ claim.prediction }}</td>
                    <td><a href="{{ url_for('generate_report', claim_id=claim.id) }}">Download PDF</a></td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
</body>
</html>
